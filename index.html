<!DOCTYPE HTML>
<html lang="en">
<head>
<title>Ahmadullah Ahmadzai | Data Analyst</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>

:root {
--bg:#f9f6f2;
--bg2:#f3ede6;
--bg3:#ede5dc;
--surface:#ffffff;
--rose:#c4756a;
--rose2:#d4887d;
--rose-soft:rgba(196,117,106,0.10);
--rose-mid:rgba(196,117,106,0.22);
--slate:#3d4a5c;
--slate2:#526070;
--slate-soft:rgba(61,74,92,0.07);
--text:#2a2e35;
--muted:#7e8899;
--border:rgba(61,74,92,0.10);
--border2:rgba(61,74,92,0.18);
--shadow-xs:0 1px 3px rgba(0,0,0,0.05),0 2px 8px rgba(0,0,0,0.04);
--shadow:0 4px 16px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.04);
--shadow-lg:0 12px 48px rgba(0,0,0,0.10),0 4px 16px rgba(0,0,0,0.06);
--font-serif:'Playfair Display',Georgia,serif;
--font-body:'Plus Jakarta Sans',sans-serif;
--font-mono:'DM Mono',monospace;
--r:12px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
background:var(--bg);
color:var(--text);
font-family:var(--font-body);
font-size:15.5px;
line-height:1.72;
overflow-x:hidden;
}

body::after{
content:'';
position:fixed;
inset:0;
z-index:0;
pointer-events:none;
background-image:radial-gradient(circle,rgba(61,74,92,0.07) 1px,transparent 1px);
background-size:28px 28px;
}

*{position:relative;z-index:1;}

/* NAV */

.nav-wrap{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:300;
width:calc(100% - 3rem);
max-width:780px;
}

nav{
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,0.82);
backdrop-filter:blur(20px);
border:1px solid var(--border2);
border-radius:999px;
padding:0.5rem 0.5rem 0.5rem 1.6rem;
box-shadow:0 8px 32px rgba(61,74,92,0.12),0 2px 8px rgba(0,0,0,0.06);
}

.nav-logo{
font-family:var(--font-serif);
font-size:1rem;
font-weight:700;
color:var(--text);
text-decoration:none;
}

.nav-logo em{color:var(--rose);}

.nav-links{display:flex;gap:0.1rem;}

.nav-links a{
font-size:0.78rem;
color:var(--muted);
text-decoration:none;
padding:0.38rem 0.85rem;
border-radius:999px;
}

.nav-links a:hover{
color:var(--text);
background:var(--slate-soft);
}

.nav-cta{
font-size:0.78rem;
font-weight:600;
background:var(--slate);
color:#fff;
padding:0.48rem 1.2rem;
border-radius:999px;
text-decoration:none;
}

/* HERO */

#hero{
min-height:90vh;
display:grid;
grid-template-columns:1fr 320px;
align-items:center;
gap:3rem;
padding:7rem 5rem 4rem;
max-width:1200px;
margin:0 auto;
}

.hero-right{
opacity:0;
animation:fadeUp 0.75s 0.28s forwards;
max-width:300px;
}

.profile-photo{
width:260px;
aspect-ratio:3/4;
border-radius:24px 80px 24px 80px;
overflow:hidden;
background:var(--bg3);
box-shadow:var(--shadow-lg);
margin:0 auto;
}

.profile-photo img{
width:100%;
height:100%;
object-fit:cover;
object-position:top center;
}

/* SECTIONS */

.sw{
padding:4rem 5rem;
}

.sh{
margin-bottom:2rem;
}

/* ANIMATION */

@keyframes fadeUp{
from{opacity:0;transform:translateY(26px);}
to{opacity:1;transform:translateY(0);}
}

/* RESPONSIVE */

@media (max-width:980px){

#hero{
grid-template-columns:1fr;
padding:6rem 2rem 3rem;
gap:2rem;
}

.hero-right{
order:-1;
margin:auto;
}

.sw{
padding:3rem 2rem;
}

}

</style>
</head>

<body>

<section id="hero">

<div class="hero-left">

<h1>
<span>Ahmadullah</span><br>
<span style="color:#c4756a;font-style:italic;">Ahmadzai</span>
</h1>

<p style="margin-top:1rem;color:#7e8899;">
Development Economics graduate specialized in econometrics, geospatial analysis, and business intelligence — transforming complex data into decisions that matter.
</p>

</div>

<div class="hero-right">

<div class="profile-photo">
<img src="images/Pro.jpg" alt="Ahmadullah Ahmadzai">
</div>

</div>

</section>

</body>
</html>
